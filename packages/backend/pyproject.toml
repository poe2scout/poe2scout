[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "poe2scout-backend"
version = "0.1.0"
description = "Backend services for POE2 Scout."
requires-python = ">=3.14"
dependencies = [
  "annotated-types==0.7.0",
  "anyio==4.9.0",
  "cachetools==5.5.2",
  "certifi==2025.1.31",
  "charset-normalizer==3.4.1",
  "click==8.1.8",
  "colorama==0.4.6",
  "deprecated==1.2.18",
  "dnspython==2.7.0",
  "dotenv==0.9.9",
  "email-validator==2.2.0",
  "fastapi==0.121.0",
  "h11==0.16.0",
  "httpcore==1.0.9",
  "httpx==0.28.1",
  "idna==3.10",
  "jinja2==3.1.6",
  "limits==4.7.3",
  "markdown-it-py==3.0.0",
  "markupsafe==3.0.2",
  "mdurl==0.1.2",
  "packaging==24.2",
  "psycopg==3.3.3",
  "psycopg-binary==3.3.3",
  "psycopg-pool==3.3.0",
  "prometheus-client==0.23.1",
  "pydantic==2.12.5",
  "pygments==2.20.0",
  "python-dotenv==1.1.0",
  "python-multipart==0.0.22",
  "pyyaml==6.0.2",
  "redis==5.2.1",
  "requests==2.33.0",
  "rich==14.0.0",
  "rich-toolkit==0.14.1",
  "shellingham==1.5.4",
  "slowapi==0.1.9",
  "sniffio==1.3.1",
  "starlette==0.49.1",
  "typer==0.15.2",
  "typing-extensions==4.14.1",
  "typing-inspection==0.4.2",
  "tzdata==2025.2",
  "urllib3==2.6.3",
  "uvicorn==0.34.0",
  "watchfiles>=1.0.4",
  "websockets==15.0.1",
  "wrapt==1.17.2",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "B", "N"]

[tool.ruff.format]
quote-style = "double"
