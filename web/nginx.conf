server {
    listen       3000;
    server_name  poe2scout.com;
    absolute_redirect off;
    port_in_redirect off;

    location ~ ^/exchange/pair/([^/]+)/([^/]+)/?$ {
        return 301 /poe2/vaal/exchange/pair/$1/$2$is_args$args;
    }

    location = /exchange {
        return 301 /poe2/vaal/exchange$is_args$args;
    }

    location /exchange/ {
        return 301 /poe2/vaal/exchange$is_args$args;
    }

    location = /economy {
        return 301 /poe2/vaal/economy$is_args$args;
    }

    location ^~ /economy/ {
        return 301 /poe2/vaal/economy$is_args$args;
    }

    location ^~ /assets/ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=300, s-maxage=7200, stale-while-revalidate=86400" always;
        try_files $uri $uri/ /index.html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
