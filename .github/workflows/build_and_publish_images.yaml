name: Build and Publish Images

on:
  push:
    branches:
      - main
      - release

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: poe2scout-api
            context: ./net
            dockerfile: ./net/Poe2scout.Api/Dockerfile
          - image: poe2scout-item-sync
            context: ./net
            dockerfile: ./net/Poe2scout.ItemSync.Worker/Dockerfile
          - image: poe2scout-currency-price-log
            context: ./net
            dockerfile: ./net/Poe2scout.CurrencyPriceLog.Worker/Dockerfile
          - image: poe2scout-unique-price-log
            context: ./net
            dockerfile: ./net/Poe2scout.UniquePriceLog.Worker/Dockerfile
          - image: poe2scout-currency-exchange
            context: ./net
            dockerfile: ./net/Poe2scout.CurrencyExchange.Worker/Dockerfile
          - image: poe2scout-currency-item-mapping
            context: ./net
            dockerfile: ./net/Poe2scout.CurrencyItemMapping.Worker/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image alias tag
        id: image-tag
        run: |
          if [ "${GITHUB_REF_NAME}" = "release" ]; then
            echo "alias_tag=release" >> "$GITHUB_OUTPUT"
          else
            echo "alias_tag=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/poe2scout/${{ matrix.image }}:${{ steps.image-tag.outputs.alias_tag }}
            ${{ env.REGISTRY }}/poe2scout/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
