name: Deploy Core

on:
  workflow_dispatch:

env:
  DEPLOY_ROOT: /opt/poe2scout/core

concurrency:
  group: deploy-core
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Write production env file
        run: |
          cat > .deploy.env <<'EOF'
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

      - name: Prepare deploy directory
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ env.DEPLOY_ROOT }}/infra"

      - name: Sync infrastructure files
        run: |
          rsync -az --delete --exclude '.DS_Store' infra/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_ROOT }}/infra/
          scp .deploy.env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_ROOT }}/.env

      - name: Deploy core
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          set -euo pipefail
          cd ${{ env.DEPLOY_ROOT }}
          docker network inspect poe2scout >/dev/null 2>&1 || docker network create poe2scout
          docker volume inspect poe2market_pgdata6 >/dev/null 2>&1 || docker volume create poe2market_pgdata6
          docker compose -p poe2scout-core -f infra/core.yml --env-file .env pull
          docker compose -p poe2scout-core -f infra/core.yml --env-file .env up -d
          "
