services:
  db:
    image: postgres:17.6
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - poe2market_pgdata6:/var/lib/postgresql/data
      - ./db/conf/postgresql.conf:/etc/postgresql/postgresql.conf.d/postgresql.conf
    ports:
      - "127.0.0.1:5432:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf.d/postgresql.conf

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  poe2market_pgdata6:
    external: true

networks:
  default:
    name: poe2scout
    external: true
