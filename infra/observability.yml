services:
  grafana:
    image: grafana/grafana:12.4
    restart: unless-stopped
    environment:
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitoring.poe2scout.com
      GF_SERVER_DOMAIN: monitoring.poe2scout.com
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  prometheus:
    image: prom/prometheus:v3.5.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    expose:
      - "9090"
    volumes:
      - prometheus-data:/prometheus
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  loki:
    image: grafana/loki:3.5.12
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    expose:
      - "3100"
    volumes:
      - loki-data:/loki
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro

  alloy:
    image: grafana/alloy:v1.14.0
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - alloy-data:/var/lib/alloy/data
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true

volumes:
  grafana-data:
    name: compose_grafana-data
    external: true
  prometheus-data:
    name: compose_prometheus-data
    external: true
  loki-data:
    name: compose_loki-data
    external: true
  alloy-data:
    name: compose_alloy-data
    external: true

networks:
  default:
    name: poe2scout
    external: true
