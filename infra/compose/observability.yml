services:
  https-portal:
    depends_on:
      - grafana

  api:
    environment:
      LOG_JSON: ${LOG_JSON:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 9105
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: api
      SLOW_REQUEST_THRESHOLD_MS: ${SLOW_REQUEST_THRESHOLD_MS:-750}
    expose:
      - "9105"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:5000/health/live", timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  item-sync-service:
    restart: unless-stopped
    environment:
      LOG_JSON: ${LOG_JSON:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 9101
      SERVICE_NAME: item-sync
    expose:
      - "9101"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:9101/health", timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  currency-price-log-service:
    restart: unless-stopped
    environment:
      LOG_JSON: ${LOG_JSON:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 9102
      SERVICE_NAME: currency-price-log
    expose:
      - "9102"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:9102/health", timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  unique-price-log-service:
    restart: unless-stopped
    environment:
      LOG_JSON: ${LOG_JSON:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 9103
      SERVICE_NAME: unique-price-log
    expose:
      - "9103"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:9103/health", timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  currency-exchange-service:
    restart: unless-stopped
    environment:
      LOG_JSON: ${LOG_JSON:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 9104
      SERVICE_NAME: currency-exchange
    expose:
      - "9104"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:9104/health", timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  grafana:
    image: grafana/grafana:12.4
    restart: unless-stopped
    environment:
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${MONITORING_DOMAIN}
      GF_SERVER_DOMAIN: ${MONITORING_DOMAIN}
      GF_USERS_ALLOW_SIGN_UP: "false"
    expose:
      - "3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  prometheus:
    image: prom/prometheus:v3.5.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    expose:
      - "9090"
    volumes:
      - prometheus-data:/prometheus
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      - item-sync-service
      - currency-price-log-service
      - unique-price-log-service
      - currency-exchange-service

  loki:
    image: grafana/loki:3.5.12
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    expose:
      - "3100"
    volumes:
      - loki-data:/loki
      - ../observability/loki/config.yml:/etc/loki/config.yml:ro

  alloy:
    image: grafana/alloy:v1.14.0
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - alloy-data:/var/lib/alloy/data
      - ../observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    expose:
      - "9100"
    volumes:
      - /:/host:ro,rslave

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${DBSTRING}
    expose:
      - "9187"
    depends_on:
      db:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  alloy-data:
