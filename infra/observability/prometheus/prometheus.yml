global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:9105

  - job_name: item-sync
    metrics_path: /metrics
    static_configs:
      - targets:
          - item-sync-service:9101

  - job_name: currency-price-log
    metrics_path: /metrics
    static_configs:
      - targets:
          - currency-price-log-service:9102

  - job_name: unique-price-log
    metrics_path: /metrics
    static_configs:
      - targets:
          - unique-price-log-service:9103

  - job_name: currency-exchange
    metrics_path: /metrics
    static_configs:
      - targets:
          - currency-exchange-service:9104

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121
