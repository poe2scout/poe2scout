apiVersion: 1

groups:
  - orgId: 1
    name: api-alerts
    folder: Observability
    interval: 1m
    rules:
      - uid: apiunavailable
        title: APIUnavailable
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 120
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max_over_time(up{job="api"}[2m])
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: API target has been down for at least two minutes.
        labels:
          alertname: APIUnavailable
          service: api
          severity: critical
      - uid: apireadinessfail
        title: APIReadinessFailing
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: min_over_time(poe2scout_readiness_dependency_up{service="api"}[5m])
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: API readiness dependencies have been failing for at least five minutes.
        labels:
          alertname: APIReadinessFailing
          service: api
          severity: critical
      - uid: apihigh5xxrate
        title: APIHigh5xxRate
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(rate(poe2scout_http_5xx_total{service="api"}[10m])) / clamp_min(sum(rate(poe2scout_http_requests_total{service="api"}[10m])), 1)
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.02
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 10m
        annotations:
          summary: API 5xx rate is above 2% for the last ten minutes.
        labels:
          alertname: APIHigh5xxRate
          service: api
          severity: warning
      - uid: apihighlatencyp95
        title: APIHighLatencyP95
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: histogram_quantile(0.95, sum by (le) (rate(poe2scout_http_request_duration_seconds_bucket{service="api"}[15m])))
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 2
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 15m
        annotations:
          summary: API overall p95 latency is above two seconds for the last fifteen minutes.
        labels:
          alertname: APIHighLatencyP95
          service: api
          severity: warning
  - orgId: 1
    name: service-health-alerts
    folder: Observability
    interval: 1m
    rules:
      - uid: workernorecentsucc
        title: WorkerNoRecentSuccess
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: ((poe2scout_worker_last_success_timestamp_seconds{service=~"item-sync|currency-price-log|unique-price-log|currency-exchange"} > 0) and (time() - poe2scout_worker_last_success_timestamp_seconds{service=~"item-sync|currency-price-log|unique-price-log|currency-exchange"} - (poe2scout_worker_expected_interval_seconds{service=~"item-sync|currency-price-log|unique-price-log|currency-exchange"} * 2))) or ((poe2scout_worker_last_success_timestamp_seconds{service=~"item-sync|currency-price-log|unique-price-log|currency-exchange"} == 0) and (time() - poe2scout_worker_started_timestamp_seconds{service=~"item-sync|currency-price-log|unique-price-log|currency-exchange"} - (poe2scout_worker_expected_interval_seconds{service=~"item-sync|currency-price-log|unique-price-log|currency-exchange"} * 2)))
              instant: true
              intervalMs: 1000
              legendFormat: "{{ service }}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: A worker has not reported a successful iteration inside its expected window.
        labels:
          alertname: WorkerNoRecentSuccess
          severity: warning
      - uid: containerrestarts
        title: ContainerRestarting
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum by (container_label_com_docker_compose_service) (changes(container_start_time_seconds{container_label_com_docker_compose_service!=""}[15m]))
              instant: true
              intervalMs: 1000
              legendFormat: "{{ container_label_com_docker_compose_service }}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 3
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: A container has restarted more than three times in fifteen minutes.
        labels:
          alertname: ContainerRestarting
          severity: warning
      - uid: postgresdown
        title: PostgresDown
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max_over_time(up{job="postgres-exporter"}[5m])
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: The Postgres exporter has been unavailable for five minutes.
        labels:
          alertname: PostgresDown
          severity: critical
      - uid: redisdown
        title: RedisDown
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: max_over_time(up{job="redis-exporter"}[5m])
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: The Redis exporter has been unavailable for five minutes.
        labels:
          alertname: RedisDown
          severity: critical
