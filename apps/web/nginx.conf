server {
    listen       3000;
    server_name  old.poe2scout.com;

    location ^~ /assets/ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=300, s-maxage=7200, stale-while-revalidate=86400" always;
        try_files $uri $uri/ /index.html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

}
